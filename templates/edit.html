<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Edit Transaction</h1>
        <p class="subtitle">Update the transaction details below.</p>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-container">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Edit form -->
        <div class="form-section">
            <form action="/update/{{ transaction.id }}" method="POST">
                <div class="form-row">
                    <label for="type">Type</label>
                    <select name="type" id="type" required>
                        <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
                        <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="category">Category</label>
                    <select name="category" id="category" required>
                        {% for category in categories %}
                            <option value="{{ category }}" {% if transaction.category == category %}selected{% endif %}>
                                {{ category }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-row">
                    <label for="amount">Amount</label>
                    <input
                        type="number"
                        step="0.01"
                        min="0.01"
                        name="amount"
                        id="amount"
                        value="{{ transaction.amount }}"
                        required>
                </div>

                <div class="form-row">
                    <label for="description">Description</label>
                    <input
                        type="text"
                        name="description"
                        id="description"
                        maxlength="200"
                        value="{{ transaction.description }}"
                        placeholder="Optional">
                </div>

                <div class="form-row">
                    <label for="date">Date</label>
                    <input
                        type="date"
                        name="date"
                        id="date"
                        value="{{ transaction.date }}"
                        required>
                </div>

                <div class="edit-actions">
                    <button type="submit">Save Changes</button>
                    <a href="/" class="cancel-link">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
